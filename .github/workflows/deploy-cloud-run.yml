name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ny-building-bot-496807
  GCP_REGION: us-east1
  IMAGE_REPO: us-east1-docker.pkg.dev/ny-building-bot-496807/nyc-building-bot/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GCP deploy secret is configured
        run: |
          if [ -z "${{ secrets.GCP_CREDENTIALS }}" ]; then
            echo "::error::GitHub secret GCP_CREDENTIALS is missing or empty."
            echo "Add it in: Repo → Settings → Secrets and variables → Actions"
            echo "Value: full JSON key for a GCP service account with Cloud Run, Artifact Registry, and Scheduler permissions."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com cloudbuild.googleapis.com cloudscheduler.googleapis.com

      - name: Create Artifact Registry repository if not exists
        run: |
          if ! gcloud artifacts repositories describe nyc-building-bot --location=us-east1; then
            gcloud artifacts repositories create nyc-building-bot --repository-format=docker --location=us-east1 --description="Docker repository for NYC Building Bot"
          fi

      - name: Create service account if not exists
        run: |
          if ! gcloud iam service-accounts describe cloud-run-scheduler@ny-building-bot-496807.iam.gserviceaccount.com; then
            gcloud iam service-accounts create cloud-run-scheduler --display-name="Cloud Run Scheduler"
          fi
          gcloud projects add-iam-policy-binding ny-building-bot-496807 \
            --member="serviceAccount:cloud-run-scheduler@ny-building-bot-496807.iam.gserviceaccount.com" \
            --role="roles/run.invoker"

      - name: Create credentials files
        run: |
          echo "${{ secrets.GOOGLE_SHEET_CREDENTIALS }}" | base64 -d > google-sheet-credentials.json
          echo "${{ secrets.GOOGLE_DATASTORE_CREDENTIALS }}" | base64 -d > google-datastore-credentials.json

      - name: Create .env.yaml
        run: |
          cat > .env.yaml <<EOF
          RESEND_API_KEY: '${{ secrets.RESEND_API_KEY }}'
          FROM_EMAIL: '${{ secrets.FROM_EMAIL }}'
          GOOGLE_AI_API_KEY: '${{ secrets.GOOGLE_AI_API_KEY }}'
          GOOGLE_SHEET_CREDENTIALS_PATH: /app/google-sheet-credentials.json
          GOOGLE_DATASTORE_CREDENTIALS_PATH: /app/google-datastore-credentials.json
          PROJECT1_GOOGLE_SHEET_ID: '${{ secrets.PROJECT1_GOOGLE_SHEET_ID }}'
          PROJECT2_GOOGLE_SHEET_ID: '${{ secrets.PROJECT2_GOOGLE_SHEET_ID }}'
          PROJECT2_GOOGLE_SHEET_NAME: '${{ secrets.PROJECT2_GOOGLE_SHEET_NAME }}'
          GCP_PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
          GCP_LOCATION: '${{ secrets.GCP_LOCATION }}'
          CLOUD_TASKS_QUEUE_NAME: '${{ secrets.CLOUD_TASKS_QUEUE_NAME }}'
          CLOUD_TASKS_SERVICE_ACCOUNT: '${{ secrets.CLOUD_TASKS_SERVICE_ACCOUNT }}'
          SERVICE_URL: '${{ secrets.SERVICE_URL }}'
          RUN_HTTP_SERVER: "true"
          HTTP_PROXY: '${{ secrets.HTTP_PROXY }}'
          HTTPS_PROXY: '${{ secrets.HTTPS_PROXY }}'
          SERP_API_KEY: '${{ secrets.SERP_API_KEY }}'
          EOF

      - name: Build and push Docker image
        run: |
          docker build --pull --no-cache \
            -t "${{ env.IMAGE_REPO }}:latest" \
            -t "${{ env.IMAGE_REPO }}:${{ github.sha }}" .
          docker push "${{ env.IMAGE_REPO }}:latest"
          docker push "${{ env.IMAGE_REPO }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy nyc-building-bot \
            --image "${{ env.IMAGE_REPO }}:${{ github.sha }}" \
            --region us-east1 --platform managed \
            --cpu 2 --memory 8Gi --timeout 3600 \
            --env-vars-file .env.yaml \
            --vpc-connector bot-serverless-conn --vpc-egress all-traffic \
            --no-allow-unauthenticated --min-instances 0 --max-instances 1 --cpu-throttling

      - name: Get Cloud Run service URL
        id: get_url
        run: |
          URL=$(gcloud run services describe nyc-building-bot --region us-east1 --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Create or update Cloud Scheduler job
        run: |
          if gcloud scheduler jobs describe daily-tasks --location=us-east1; then
            gcloud scheduler jobs update http daily-tasks \
              --schedule="30 7 * * *" \
              --uri="${{ steps.get_url.outputs.url }}/trigger" \
              --http-method=POST \
              --time-zone="America/New_York" \
              --location=us-east1 \
              --oidc-service-account-email="cloud-run-scheduler@ny-building-bot-496807.iam.gserviceaccount.com"
          else
            gcloud scheduler jobs create http daily-tasks \
              --schedule="30 7 * * *" \
              --uri="${{ steps.get_url.outputs.url }}/trigger" \
              --http-method=POST \
              --time-zone="America/New_York" \
              --location=us-east1 \
              --oidc-service-account-email="cloud-run-scheduler@ny-building-bot-496807.iam.gserviceaccount.com"
          fi
